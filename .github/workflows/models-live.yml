name: models-live

# Streams model frames as Open-Meteo uploads them to S3 (data_spatial
# per-timestep files land near-real-time WHILE each model runs). Every tick
# diffs against R2 state and publishes only NEW frames — steady ticks are
# minutes; a run-switch burst self-heals across ticks via the state diff.

on:
  schedule:
    # Two single-minute entries (matches the known-firing hourly.yml shape);
    # rewriting this block also re-registers the schedule — GitHub never
    # started firing the original combined "11,41" cron after workflow creation.
    - cron: "11 * * * *"
    - cron: "41 * * * *"
  workflow_dispatch:
    inputs:
      families:
        description: "Family slugs comma-separated (gfs,hrrr,euro,ukmet,icon,gem) or 'all'"
        default: "all"
        required: false

env:
  PYTHONUNBUFFERED: "1"

# Never two ticks at once; a queued tick coalesces with the next.
concurrency:
  group: models-live
  cancel-in-progress: false

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Restore static cache (PRISM land mask)
        uses: actions/cache/restore@v4
        with:
          path: static_cache
          key: static-cache-v2-${{ github.run_id }}
          restore-keys: static-cache-v2-
      - name: Stream new frames
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PIPELINE_USER_AGENT: ${{ vars.PIPELINE_USER_AGENT }}
          REQUIRE_R2: "1"
        run: |
          python -m pipeline.stream --families "${{ github.event.inputs.families || 'all' }}"
