name: deploy

on:
  push:
    branches: [main]
    paths: ["web/**", "worker/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
        env:
          VITE_DATA_BASE: ${{ vars.DATA_BASE_URL }} # e.g. https://pub-xxxx.r2.dev
          VITE_CHAT_API: ${{ vars.CHAT_API_URL }} # e.g. https://seasonmap-api.<acct>.workers.dev/api/chat
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=seasonmap

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
      # Heartbeat credential: repo secret -> worker secret. Skipped until the
      # GH_DISPATCH_TOKEN repo secret exists; the scheduled handler no-ops
      # without it, so deploys stay green either way.
      - name: Sync heartbeat secret to worker
        if: ${{ env.GH_DISPATCH_TOKEN != '' }}
        working-directory: worker
        run: npm ci --ignore-scripts && echo "$GH_DISPATCH_TOKEN" | npx wrangler secret put GH_DISPATCH_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
