name: nightly-pipeline

on:
  schedule:
    - cron: "0 6 * * *" # ~06:00 UTC nightly
  workflow_dispatch:
    inputs:
      layer:
        description: "Layer slug or 'all'"
        default: "all"
        required: false
      date:
        description: "Run date (YYYY-MM-DD or 'today')"
        default: "today"
        required: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # performance target: nightly < 30 min
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Restore static input cache (PRISM normals, elevation, …)
        uses: actions/cache@v4
        with:
          path: static_cache
          key: static-cache-v1

      - name: Run pipeline
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PIPELINE_USER_AGENT: ${{ vars.PIPELINE_USER_AGENT }}
        run: |
          python -m pipeline.run \
            --layer "${{ github.event.inputs.layer || 'all' }}" \
            --date "${{ github.event.inputs.date || 'today' }}"
