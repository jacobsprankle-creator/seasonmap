name: nightly-pipeline

on:
  schedule:
    - cron: "0 6 * * *" # ~06:00 UTC nightly
  workflow_dispatch:
    inputs:
      layer:
        description: "Layer slug(s), comma-separated, or 'all'"
        default: "all"
        required: false
      date:
        description: "Run date (YYYY-MM-DD or 'today')"
        default: "today"
        required: false

env:
  PYTHONUNBUFFERED: "1"

jobs:
  # ── 1. Warm the shared static-input cache once ─────────────────────────
  # DEM + PRISM normals + frost climatologies. The matrix jobs below restore
  # this cache instead of each re-downloading ~500 MB of inputs. Saved under
  # a per-run key (always saveable) and restored by newest prefix match, so
  # a killed run can never poison the cache.
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Restore newest static cache
        uses: actions/cache/restore@v4
        with:
          path: static_cache
          key: static-cache-v2-${{ github.run_id }}
          restore-keys: static-cache-v2-
      - name: Warm static inputs (DEM, PRISM, frost climatology)
        env:
          PIPELINE_USER_AGENT: ${{ vars.PIPELINE_USER_AGENT }}
        run: python -m pipeline.warm
      - name: Save static cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: static_cache
          key: static-cache-v2-${{ github.run_id }}

  # ── 2. All layer groups in parallel ────────────────────────────────────
  # fail-fast disabled: one group failing (or timing out) never takes the
  # others down. `if: always()` keeps the night alive even if warm failed —
  # groups then download what they need themselves.
  layers:
    needs: warm
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.layer == 'all' || github.event.inputs.layer == '') }}
    runs-on: ubuntu-latest
    name: ${{ matrix.group }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      max-parallel: 3 # gentle on Open-Meteo — 7 concurrent fetchers caused 429 stampedes
      fail-fast: false
      matrix:
        include:
          - group: climatology
            layers: elevation,frost,frost_date,frost_date_36,frost_date_28,snowline
            timeout: 60
          - group: seasons
            layers: foliage,leafout,leafout_bloom
            timeout: 30
          - group: storms
            layers: hurricanes_majors,hurricanes_modern,hurricanes_active,tornadoes_violent,tornadoes_strong,tornadoes_weak
            timeout: 30
          - group: water
            layers: water_temp,rivers,waves,drought
            timeout: 45
          - group: nowcast
            layers: conditions_temp,conditions_humidity,conditions_dewpoint,conditions_wind,air_aqi,air_pm25,air_smoke
            timeout: 40
          # Models ride a 1° grid and the API's multi-model batching: each
          # job below makes ONE grid pass for its three models (~24× fewer
          # API calls than the original 6 × 0.5° jobs — quota-safe).
          # Model rasters come from a 1° grid — zoom 5 tiles are visually
          # identical at synoptic scale and 16× cheaper to render than zoom 7
          # (run #8 post-mortem: groups fetched fine, then timed out rendering
          # 192 full pyramids).
          # The motion trio (tmax/precip3/sfc) is streamed live by
          # models-live.yml — nightly renders only the daily parameters.
          - group: models-a
            layers: gfs_precip24,gfs_precip,gfs_snow,gfs_mslp,gfs_z500,gfs_w250,gfs_gusts,gfs_cape,hrrr_precip24,hrrr_precip,hrrr_snow,hrrr_mslp,hrrr_gusts,hrrr_cape
            model_group: gfs_seamless,gfs_hrrr
            maxzoom: 5
            timeout: 55
          - group: models-b
            layers: euro_precip24,euro_precip,euro_snow,euro_mslp,euro_z500,euro_w250,euro_gusts,euro_cape
            model_group: ecmwf_ifs025
            maxzoom: 5
            timeout: 55
          - group: models-c
            layers: ukmet_precip24,ukmet_precip,ukmet_snow,ukmet_mslp,ukmet_z500,ukmet_w250,ukmet_gusts,ukmet_cape,gem_precip24,gem_precip,gem_snow,gem_mslp,gem_z500,gem_w250,gem_gusts,gem_cape
            model_group: ukmo_seamless,gem_seamless
            maxzoom: 5
            timeout: 55
          - group: models-d
            layers: icon_precip24,icon_precip,icon_snow,icon_mslp,icon_z500,icon_w250,icon_gusts,icon_cape
            model_group: icon_seamless
            maxzoom: 5
            timeout: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Restore static cache
        uses: actions/cache/restore@v4
        with:
          path: static_cache
          key: static-cache-v2-${{ github.run_id }}
          restore-keys: static-cache-v2-
      - name: Run ${{ matrix.group }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PIPELINE_USER_AGENT: ${{ vars.PIPELINE_USER_AGENT }}
          REQUIRE_R2: "1"
          OPEN_METEO_MODEL_GROUP: ${{ matrix.model_group || '' }}
        run: |
          python -m pipeline.run \
            --layer "${{ matrix.layers }}" \
            --date "${{ github.event.inputs.date || 'today' }}" \
            --max-zoom "${{ matrix.maxzoom || 7 }}"

  # ── 3. Manual single-layer runs (debugging) ────────────────────────────
  single:
    needs: warm
    if: ${{ always() && github.event_name == 'workflow_dispatch' && github.event.inputs.layer != 'all' && github.event.inputs.layer != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Restore static cache
        uses: actions/cache/restore@v4
        with:
          path: static_cache
          key: static-cache-v2-${{ github.run_id }}
          restore-keys: static-cache-v2-
      - name: Run ${{ github.event.inputs.layer }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PIPELINE_USER_AGENT: ${{ vars.PIPELINE_USER_AGENT }}
          REQUIRE_R2: "1"
        run: |
          python -m pipeline.run \
            --layer "${{ github.event.inputs.layer }}" \
            --date "${{ github.event.inputs.date || 'today' }}"
