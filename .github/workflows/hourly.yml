name: hourly-conditions

# Keeps the current-conditions layers honest. Cheap: one coarse Open-Meteo
# fetch + four small tile sets, ~2 minutes. Free on public repos.
on:
  schedule:
    - cron: "8 * * * *"
  workflow_dispatch:

jobs:
  conditions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Publish current conditions
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PIPELINE_USER_AGENT: ${{ vars.PIPELINE_USER_AGENT }}
        run: |
          for L in conditions_temp conditions_humidity conditions_dewpoint conditions_wind rivers; do
            python -m pipeline.run --layer "$L" --date today
          done
